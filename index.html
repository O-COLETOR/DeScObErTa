<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Universal Local Anomalous Wiki</title>

  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #0b0b0f;
      color: #eaeaea;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    h1 {
      text-align: center;
      padding: 20px;
      margin: 0;
    }

    #viewer {
      width: 100%;
      height: calc(100vh - 70px);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* WRAPPER COM ANIMAÇÃO */
    .post-wrap {
      width: min(700px, 100%);
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;

      opacity: 0;
      transform: translateY(25px);
      transition: opacity 300ms ease, transform 300ms ease;
    }

    .post-wrap.active {
      opacity: 1;
      transform: translateY(0);
    }

    .post {
      width: 100%;
      height: 100%;
      background: #161622;
      display: flex;
      flex-direction: column;
      padding: 12px;
      box-sizing: border-box;
      position: relative;
    }

    .title {
      text-align: center;
      font-weight: bold;
      font-size: 18px;
      margin: 10px 0;
      flex: 0 0 auto;
    }

    .post img.main-image {
      width: 68%; /* +70% aproximado */
      max-width: 100%;
      margin: 0 auto 15px auto;
      border-radius: 6px;
    }

    .text-shell {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .text {
      font-family: "Courier New", monospace;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-line;
      text-align: justify;
      overflow-y: auto;
      height: 100%;
      padding-right: 4px;
    }

    .tag {
      position: absolute;
      top: -14px;
      right: -14px;
      background: #2a2a3f;
      padding: 5px 10px;
      font-size: 12px;
      border: 1px solid #444;
      text-transform: uppercase;
      z-index: 10;
    }

    .comment-btn {
      position: absolute;
      top: 38px;
      right: -14px;
      width: 42px;
      height: 42px;
      cursor: pointer;
      z-index: 11;
      background: transparent;
      border: none;
    }

    .comment-btn img {
      width: 42px;
      height: 42px;
    }

    /* OVERLAY DE COMENTÁRIOS */
    .comment-box {
      position: absolute;
      inset: 0;
      background: #0f0f18;
      padding: 10px;
      display: flex;
      flex-direction: column;
      z-index: 20;
    }

    .comment-box[hidden] {
      display: none !important;
    }

    .comment-list {
      flex: 1;
      overflow-y: auto;
    }

    .comment {
      font-size: 13px;
      margin-bottom: 8px;
      border-bottom: 1px solid #222;
      padding-bottom: 5px;
    }

    .comment-empty {
      opacity: 0.7;
    }

    .comment-form input,
    .comment-form textarea {
      width: 100%;
      margin: 5px 0;
      background: #111;
      border: 1px solid #333;
      color: #fff;
      padding: 6px;
      border-radius: 5px;
    }

    .comment-form button {
      width: 100%;
      padding: 8px;
      background: #2a2a3f;
      border: none;
      color: white;
      cursor: pointer;
    }

    .hint {
      position: fixed;
      left: 50%;
      bottom: 10px;
      transform: translateX(-50%);
      font-size: 11px;
      opacity: 0.5;
    }
  </style>
</head>

<body>
  <h1>Universal Local Anomalous Wiki</h1>
  <div id="viewer"></div>
  <div class="hint">scroll / seta para baixo</div>

<script>
"use strict";

const viewer = document.getElementById("viewer");

const POSTS_URL = "posts.json";
const COMMENTS_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRTN5WD-EWF91lN2HfSOa1vxvw1nSr9BXMcEnnw9Ss-iZbGnA5CZ9bspP2hxOVXsJ8Y3qySnEE0froN/pub?gid=1547364444&single=true&output=csv";
const FORM_ACTION_URL = "https://docs.google.com/forms/u/0/d/e/1FAIpQLSddjs2c65DizDWs_Gzx4E1dLHdAmFa0Ir6T2MmUkPPJVWWIFA/formResponse";

const COMMENT_NAME_KEY = "ula_comment_name";

let postsData = [];
let currentIndex = -1;
let commentsByPost = {};
let locked = false;

function escapeHtml(v){
  return String(v??"")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

/* ---------- COMMENTS (mantido simples) ---------- */

async function loadComments(){
  try{
    const res = await fetch(COMMENTS_CSV_URL + "?cb=" + Date.now());
    const text = await res.text();

    commentsByPost = {};

    const rows = text.split("\n").map(r => r.split(","));
    for (let i=1;i<rows.length;i++){
      const r = rows[i];
      if (r.length < 3) continue;

      const name = r[1];
      const comment = r[2];
      const postId = r[3];

      if (!commentsByPost[postId]) commentsByPost[postId] = [];
      commentsByPost[postId].push({name, comment});
    }
  }catch(e){}
}

function renderComments(postId){
  const box = document.getElementById("comments-"+postId);
  if(!box) return;

  const list = commentsByPost[postId] || [];

  box.innerHTML = list.length
    ? list.map(c=>`<div class="comment"><b>${escapeHtml(c.name)}</b>: ${escapeHtml(c.comment)}</div>`).join("")
    : `<div class="comment-empty">Nenhum comentário</div>`;
}

/* ---------- POSTS ---------- */

function createPost(post, index){
  const wrap = document.createElement("div");
  wrap.className = "post-wrap";

  const postId = "post_" + index;

  wrap.innerHTML = `
    <div class="post">

      ${post.tag ? `<div class="tag">${escapeHtml(post.tag)}</div>` : ""}

      <button class="comment-btn" data-id="${postId}">
        <img src="https://png.pngtree.com/png-clipart/20240720/original/pngtree-comment-icon-png-image_15596549.png">
      </button>

      ${post.title ? `<div class="title">${escapeHtml(post.title)}</div>` : ""}

      ${post.image ? `<img class="main-image" src="${escapeHtml(post.image)}">` : ""}

      <div class="text-shell">
        <div class="text">${escapeHtml(post.text||"")}</div>

        <div class="comment-box" id="cbox-${postId}" hidden>
          <div class="comment-list" id="comments-${postId}"></div>
          <div class="comment-form">
            <input id="name-${postId}" placeholder="Nome">
            <textarea id="text-${postId}" placeholder="Comentário"></textarea>
            <button onclick="send('${postId}')">Enviar</button>
          </div>
        </div>

      </div>
    </div>
  `;

  return wrap;
}

function show(index){
  if(index<0||index>=postsData.length) return;

  currentIndex = index;

  const old = viewer.querySelector(".post-wrap");
  const el = createPost(postsData[index], index);

  viewer.appendChild(el);

  requestAnimationFrame(()=>{
    el.classList.add("active");
    if(old){
      old.classList.remove("active");
      setTimeout(()=>old.remove(),300);
    }
  });

  loadComments().then(()=>renderComments("post_"+index));
}

/* ---------- NAV ---------- */

function next(){
  if(locked) return;
  locked = true;

  setTimeout(()=>locked=false,500);

  const i = (currentIndex + 1) % postsData.length;
  show(i);
}

document.addEventListener("wheel",(e)=>{
  if(e.deltaY>0){
    e.preventDefault();
    next();
  }
},{passive:false});

document.addEventListener("keydown",(e)=>{
  if(["ArrowDown"," ","Enter"].includes(e.key)){
    e.preventDefault();
    next();
  }
});

/* ---------- COMMENTS TOGGLE ---------- */

document.addEventListener("click",(e)=>{
  const btn = e.target.closest(".comment-btn");
  if(!btn) return;

  const id = btn.dataset.id;
  const box = document.getElementById("cbox-"+id);
  if(!box) return;

  box.hidden = !box.hidden;

  if(!box.hidden){
    renderComments(id);
  }
});

/* ---------- SEND ---------- */

window.send = function(postId){
  const n = document.getElementById("name-"+postId);
  const t = document.getElementById("text-"+postId);

  fetch(FORM_ACTION_URL,{
    method:"POST",
    body:new URLSearchParams({
      "entry.428724025": n.value,
      "entry.1423901132": t.value,
      "entry.374539906": postId
    })
  });

  t.value="";
  setTimeout(()=>loadComments().then(()=>renderComments(postId)),1000);
}

/* ---------- INIT ---------- */

(async function init(){
  const posts = await fetch(POSTS_URL).then(r=>r.json());
  postsData = posts;

  await loadComments();
  show(0);
})();
</script>

</body>
</html>
