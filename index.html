<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Universal Local Anomalous Wiki</title>

  <style>
    body {
      margin: 0;
      background: #0b0b0f;
      color: #eaeaea;
      font-family: Arial, sans-serif;
    }

    h1 {
      text-align: center;
      padding: 20px;
    }

    .feed {
      max-width: 600px;
      margin: auto;
      padding: 10px;
      box-sizing: border-box;
    }

    .post {
      position: relative;
      background: #161622;
      margin: 20px 0;
      border-radius: 10px;
      overflow: visible;
      padding: 10px;
      box-sizing: border-box;
    }

    .title {
      text-align: center;
      margin: 10px 0 15px 0;
      font-weight: bold;
      font-size: 18px;
    }

    .post img {
      width: 40%;
      display: block;
      margin: 0 auto 15px auto;
      border-radius: 6px;
      max-width: 100%;
      height: auto;
    }

    .text {
      text-align: justify;
      line-height: 1.6;
      font-family: "Courier New", monospace;
      font-size: 14px;
      white-space: pre-line;
    }

    .tag {
      position: absolute;
      top: -10px;
      right: -10px;
      background: #2a2a3f;
      color: #fff;
      padding: 5px 10px;
      font-size: 12px;
      border: 1px solid #444;
      text-transform: uppercase;
      z-index: 10;
    }

    .tremor {
      animation: tremor 0.08s infinite;
    }

    @keyframes tremor {
      0%   { transform: translate(0px, 0px) rotate(0deg); }
      20%  { transform: translate(5px, -5px) rotate(2deg); }
      40%  { transform: translate(-5px, 5px) rotate(-2deg); }
      60%  { transform: translate(5px, 5px) rotate(2deg); }
      80%  { transform: translate(-5px, -5px) rotate(-2deg); }
      100% { transform: translate(0px, 0px) rotate(0deg); }
    }

    @media (max-width: 600px) {
      .feed {
        width: 100%;
        padding: 8px;
      }

      .post {
        margin: 12px 0;
        padding: 10px;
        border-radius: 8px;
      }

      .title {
        font-size: 16px;
        margin: 8px 0 12px 0;
      }

      .post img {
        width: 85%;
        margin: 0 auto 12px auto;
      }

      .text {
        font-size: 13px;
        line-height: 1.5;
      }

      .tag {
        font-size: 11px;
        top: -8px;
        right: -8px;
        padding: 4px 8px;
      }
    }
  </style>
</head>

<body>

<h1>Universal Local Anomalous Wiki</h1>

<div class="feed" id="feed"></div>

<script>
const feed = document.getElementById("feed");

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

function pickUniqueIndices(count, max) {
  const indices = Array.from({ length: max }, (_, i) => i);
  shuffle(indices);
  return new Set(indices.slice(0, count));
}

function getTremorCount(totalPosts) {
  const r = Math.random();

  if (r < 0.40) return Math.min(1, totalPosts);      // 40% -> 1 post
  if (r < 0.60) return Math.min(2, totalPosts);      // 20% -> 2 posts
  if (r < 0.65) return Math.min(4, totalPosts);      // 5%  -> 4 posts
  if (r < 0.655) return totalPosts;                  // 0.5% -> todos os posts
  return 0;                                          // resto -> nenhum
}

function render(posts) {
  const shuffled = shuffle([...posts]);
  const tremorCount = getTremorCount(shuffled.length);
  const tremorIndices = pickUniqueIndices(tremorCount, shuffled.length);

  shuffled.forEach((post, index) => {
    const div = document.createElement("div");
    div.className = "post";

    if (tremorIndices.has(index)) {
      div.classList.add("tremor");
    }

    let html = "";

    if (post.tag && post.tag.trim() !== "") {
      html += `<div class="tag">${post.tag}</div>`;
    }

    if (post.title && post.title.trim() !== "") {
      html += `<div class="title">${post.title}</div>`;
    }

    if (post.image && post.image.trim() !== "") {
      html += `<img src="${post.image}" alt="">`;
    }

    html += `<div class="text">${post.text || ""}</div>`;

    div.innerHTML = html;
    feed.appendChild(div);
  });
}

fetch("posts.json?cache=" + Date.now())
  .then(res => res.json())
  .then(data => render(data))
  .catch(err => {
    console.error(err);
    feed.innerHTML = "<p>Erro ao carregar posts.json</p>";
  });
</script>

</body>
</html>
