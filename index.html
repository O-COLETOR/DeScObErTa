<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Universal Local Anomalous Wiki</title>

  <style>
    body {
      margin: 0;
      background: #0b0b0f;
      color: #eaeaea;
      font-family: Arial, sans-serif;
    }

    h1 {
      text-align: center;
      padding: 20px;
    }

    .feed {
      max-width: 600px;
      margin: auto;
      padding: 10px;
    }

    .post {
      background: #161622;
      margin: 15px 0;
      border-radius: 10px;
      overflow: hidden;
      padding: 10px;
    }

    .post h2 {
      text-align: center;
      margin: 10px 0 15px 0;
    }

    .post img {
      width: 40%;
      display: block;
      margin: 0 auto 15px auto;
      border-radius: 6px;
    }

    .post p {
      padding: 10px;
      margin: 0;
      text-align: justify;
      line-height: 1.6;
      font-family: "Courier New", monospace;
      font-size: 14px;
      white-space: pre-line;
    }
  </style>
</head>

<body>

<h1>Universal Local Anomalous Wiki</h1>

<div class="feed" id="feed"></div>

<script>
function getPosts() {
  return JSON.parse(localStorage.getItem("posts") || "[]");
}

const defaultPosts = [
  {
    title: "O Olho no Céu",
    image: "https://picsum.photos/600/300",
    text: "RELATÓRIO DE OBSERVAÇÃO 001\n\nEntidade visual detectada em órbita lunar.\nComportamento: estático.\nResposta a estímulos: inexistente."
  },
  {
    title: "O Canto do Seu Quarto",
    image: "https://picsum.photos/601/300",
    text: "RELATÓRIO DE OCORRÊNCIA 014\n\nÁrea apresenta anomalia de iluminação.\nA luz não interage com o espaço delimitado.\nContato visual prolongado causa desconforto."
  },
  {
    title: "A Rua que Não Existe",
    image: "https://picsum.photos/602/300",
    text: "RELATÓRIO DE REGISTRO 027\n\nLocal inexistente em mapas físicos e digitais.\nTestemunhas relatam deslocamento involuntário ao tentar acesso."
  }
];

if (!localStorage.getItem("posts")) {
  localStorage.setItem("posts", JSON.stringify(defaultPosts));
}

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

const feed = document.getElementById("feed");

function render() {
  let posts = shuffle(getPosts());

  posts.forEach(post => {
    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <h2>${post.title}</h2>
      <img src="${post.image}">
      <p>${post.text}</p>
    `;

    feed.appendChild(div);
  });
}

render();
</script>

</body>
</html>
