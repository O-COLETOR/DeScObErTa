<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Universal Local Anomalous Wiki</title>

  <style>
    body {
      margin: 0;
      background: #0b0b0f;
      color: #eaeaea;
      font-family: Arial, sans-serif;
    }

    h1 {
      text-align: center;
      padding: 20px;
    }

    .feed {
      max-width: 600px;
      margin: auto;
      padding: 10px;
      box-sizing: border-box;
    }

    .post {
      position: relative;
      background: #161622;
      margin: 20px 0;
      border-radius: 10px;
      padding: 10px;
      box-sizing: border-box;
    }

    .title {
      text-align: center;
      margin: 10px 0 15px 0;
      font-weight: bold;
      font-size: 18px;
    }

    .post img {
      width: 40%;
      display: block;
      margin: 0 auto 15px auto;
      border-radius: 6px;
      max-width: 100%;
    }

    .text {
      text-align: justify;
      line-height: 1.6;
      font-family: "Courier New", monospace;
      font-size: 14px;
      white-space: pre-line;
    }

    .tag {
      position: absolute;
      top: -10px;
      right: -10px;
      background: #2a2a3f;
      color: #fff;
      padding: 5px 10px;
      font-size: 12px;
      border: 1px solid #444;
      text-transform: uppercase;
    }

    /* botão comentários */
    .comment-btn {
      position: absolute;
      bottom: 8px;
      right: 8px;
      cursor: pointer;
      font-size: 18px;
      opacity: 0.7;
    }

    .comment-box {
      display: none;
      margin-top: 10px;
      background: #0f0f18;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #333;
    }

    .comment {
      font-size: 13px;
      margin-bottom: 8px;
      border-bottom: 1px solid #222;
      padding-bottom: 5px;
    }

    .comment-form input,
    .comment-form textarea {
      width: 100%;
      margin-top: 5px;
      margin-bottom: 5px;
      background: #111;
      border: 1px solid #333;
      color: white;
      padding: 6px;
      border-radius: 5px;
    }

    .comment-form button {
      width: 100%;
      padding: 6px;
      background: #2a2a3f;
      border: none;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>Universal Local Anomalous Wiki</h1>
<div class="feed" id="feed"></div>

<script>

const feed = document.getElementById("feed");

/* 🔗 COLE AQUI SEU CSV DO GOOGLE SHEETS */
const COMMENTS_CSV_URL = "COLE_SEU_LINK_AQUI";

/* 🔗 COLE AQUI O ACTION DO GOOGLE FORM */
const FORM_ACTION_URL = "COLE_O_ACTION_DO_GOOGLE_FORM_AQUI";

let commentsByPost = {};

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

/* ===== CARREGA COMENTÁRIOS ===== */
async function loadComments() {
  const res = await fetch(COMMENTS_CSV_URL);
  const text = await res.text();

  const lines = text.split("\n").slice(1);

  commentsByPost = {};

  lines.forEach(line => {
    const cols = line.split(",");

    const name = cols[1];
    const comment = cols[2];
    const postId = cols[3];

    if (!commentsByPost[postId]) commentsByPost[postId] = [];
    commentsByPost[postId].push({ name, comment });
  });
}

/* ===== RENDER POSTS ===== */
function render(posts) {
  const shuffled = shuffle([...posts]);

  shuffled.forEach((post, index) => {
    const div = document.createElement("div");
    div.className = "post";

    const postId = index;

    let html = "";

    if (post.tag) html += `<div class="tag">${post.tag}</div>`;
    if (post.title) html += `<div class="title">${post.title}</div>`;
    if (post.image) html += `<img src="${post.image}">`;

    html += `<div class="text">${post.text}</div>`;

    /* BOTÃO */
    html += `<div class="comment-btn" onclick="toggleComments(${postId})">💬</div>`;

    /* CAIXA */
    html += `<div class="comment-box" id="cbox-${postId}">
      <div id="comments-${postId}"></div>

      <div class="comment-form">
        <input id="name-${postId}" placeholder="Nome de acesso">
        <textarea id="text-${postId}" placeholder="Comentário"></textarea>
        <button onclick="sendComment(${postId})">Enviar</button>
      </div>
    </div>`;

    div.innerHTML = html;
    feed.appendChild(div);

    renderComments(postId);
  });
}

/* ===== MOSTRAR COMENTÁRIOS ===== */
function renderComments(postId) {
  const box = document.getElementById(`comments-${postId}`);
  if (!box) return;

  const list = commentsByPost[postId] || [];

  box.innerHTML = list.map(c =>
    `<div class="comment"><b>${c.name}</b>: ${c.comment}</div>`
  ).join("");
}

/* ===== ABRIR FECHAR ===== */
function toggleComments(id) {
  const el = document.getElementById(`cbox-${id}`);
  el.style.display = el.style.display === "block" ? "none" : "block";
}

/* ===== ENVIAR COMENTÁRIO ===== */
function sendComment(postId) {
  const name = document.getElementById(`name-${postId}`).value;
  const text = document.getElementById(`text-${postId}`).value;

  const form = new FormData();
  form.append("entry.post_id", postId);
  form.append("entry.name", name);
  form.append("entry.comment", text);

  fetch(FORM_ACTION_URL, {
    method: "POST",
    mode: "no-cors",
    body: form
  });

  alert("Enviado!");
}

/* ===== INICIAL ===== */
fetch("posts.json?cache=" + Date.now())
  .then(r => r.json())
  .then(async data => {
    await loadComments();
    render(data);
  });

</script>

</body>
</html>
