<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Universal Local Anomalous Wiki</title>

  <style>
    body {
      margin: 0;
      background: #0b0b0f;
      color: #eaeaea;
      font-family: Arial, sans-serif;
    }

    h1 {
      text-align: center;
      padding: 20px;
    }

    .feed {
      max-width: 600px;
      margin: auto;
      padding: 10px;
    }

    .post {
      position: relative;
      background: #161622;
      margin: 20px 0;
      border-radius: 10px;
      overflow: visible;
      padding: 10px;
    }

    .title {
      text-align: center;
      margin: 10px 0 15px 0;
      font-weight: bold;
      font-size: 18px;
    }

    .post img {
      width: 40%;
      display: block;
      margin: 0 auto 15px auto;
      border-radius: 6px;
    }

    .text {
      text-align: justify;
      line-height: 1.6;
      font-family: "Courier New", monospace;
      font-size: 14px;
      white-space: pre-line;
    }

    /* TAG */
    .tag {
      position: absolute;
      top: -10px;
      right: -10px;
      background: #2a2a3f;
      color: #fff;
      padding: 5px 10px;
      font-size: 12px;
      border: 1px solid #444;
      border-radius: 0;
      z-index: 10;
      text-transform: uppercase;
    }
  </style>
</head>

<body>

<h1>Universal Local Anomalous Wiki</h1>

<div class="feed" id="feed"></div>

<script>
function getPosts() {
  return JSON.parse(localStorage.getItem("posts") || "[]");
}

const defaultPosts = [
  {
    title: "O Olho no Céu",
    image: "https://picsum.photos/600/300",
    text: "RELATO 001\nEntidade observada em órbita lunar.",
    tag: "CÉU"
  },
  {
    title: "Texto solto",
    text: "RELATO SEM CLASSIFICAÇÃO\nFragmento de realidade sem origem conhecida.",
    tag: ""
  },
  {
    image: "https://picsum.photos/602/300",
    text: "RELATO 019\nFenômeno não catalogado.",
    tag: "FRATURA"
  }
];

if (!localStorage.getItem("posts")) {
  localStorage.setItem("posts", JSON.stringify(defaultPosts));
}

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

const feed = document.getElementById("feed");

function render() {
  let posts = shuffle(getPosts());

  posts.forEach(post => {
    const div = document.createElement("div");
    div.className = "post";

    let html = "";

    // TAG
    if (post.tag && post.tag.trim() !== "") {
      html += `<div class="tag">${post.tag}</div>`;
    }

    // título
    if (post.title && post.title.trim() !== "") {
      html += `<div class="title">${post.title}</div>`;
    }

    // imagem
    if (post.image && post.image.trim() !== "") {
      html += `<img src="${post.image}">`;
    }

    // texto
    html += `<div class="text">${post.text || ""}</div>`;

    div.innerHTML = html;
    feed.appendChild(div);
  });
}

render();
</script>

</body>
</html>
